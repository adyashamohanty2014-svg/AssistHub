{% extends "base.html" %}
{% load static %}

{% block title %}
Edit Review
{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/profile.css' %}">
{% endblock %}

{% block content %}

<div class="profile-container">
    <div class="profile-card">
        <h1>Edit Review</h1>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">
                Save Changes
            </button>
        </form>
    </div>
</div>

{% endblock %}
