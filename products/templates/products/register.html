{% extends "base.html" %}
{% block title %}Create Account{% endblock %}
{% block content %}
<section class="register-container">
    <h1>Create Account</h1>
    <p class="subtitle">
        Join AssistHub and discover assistive devices that meet your needs.
    </p>
    <form method="post" class="register-form">
        {% csrf_token %}       
        {{ user_form.as_p }}
        <button type="submit">
            Create Account
        </button>
    </form>
    <p class="login-link">
        Already have an account?
        <a href="{% url 'login' %}">Login</a>
    </p>
</section>
{% endblock %}
