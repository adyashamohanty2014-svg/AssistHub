{% extends "base.html" %}
{% block title %}Registration Complete{% endblock %}
{% block content %}
<section class="register-done-container">
    <h1>Account Created Successfully</h1>   
    <p class="success-message">
        Welcome, <strong>{{ new_user.username }}</strong>!
    </p>   
    <p>
        Your account has been created. You can now <a href="{% url 'login' %}">login</a> with your credentials.
    </p>
</section>
{% endblock %}
